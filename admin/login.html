<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Admin Login — Gestione Visitatori</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 400px;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.3);
      padding: 40px;
      animation: fadeIn 0.4s cubic-bezier(0.22,1,0.36,1);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo-wrap {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo-wrap img {
      max-height: 70px;
      width: auto;
      object-fit: contain;
    }

    h1 {
      text-align: center;
      color: #1a202c;
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .subtitle {
      text-align: center;
      color: #718096;
      font-size: 13px;
      margin-bottom: 28px;
    }

    .form-group { margin-bottom: 18px; }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #2d3748;
      margin-bottom: 7px;
    }

    input {
      width: 100%;
      height: 50px;
      padding: 0 15px;
      border: 2px solid #e8ecf4;
      border-radius: 10px;
      font-size: 16px;
      background: #fafbfd;
      color: #2d3748;
      transition: border-color 0.18s, box-shadow 0.18s, background 0.18s;
    }

    input:focus {
      outline: none;
      border-color: #667eea;
      background: #fff;
      box-shadow: 0 0 0 4px rgba(102,126,234,0.12);
    }

    .btn-login {
      width: 100%;
      height: 52px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 14px rgba(102,126,234,0.4);
      margin-top: 6px;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 22px rgba(102,126,234,0.5);
    }

    .btn-login:active { transform: translateY(0); }

    .btn-login:disabled {
      background: #e2e8f0;
      color: #a0aec0;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .message {
      display: none;
      margin-top: 16px;
      padding: 13px 16px;
      border-radius: 9px;
      text-align: center;
      font-size: 14px;
      font-weight: 500;
    }

    .message.error   { background: #fff5f5; color: #742a2a; border: 2px solid #fc8181; }
    .message.success { background: #f0fff4; color: #22543d; border: 2px solid #68d391; }

    .info-box {
      margin-top: 20px;
      background: #ebf4ff;
      border: 1.5px solid #bee3f8;
      border-radius: 9px;
      padding: 13px 15px;
      font-size: 12px;
      color: #2c5282;
      line-height: 1.5;
    }

    .links {
      text-align: center;
      margin-top: 18px;
      font-size: 13px;
      color: #718096;
    }

    .links a {
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
    }

    .links a:hover { text-decoration: underline; }

    @media (max-width: 440px) {
      .card { padding: 30px 22px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-wrap">
      <img src="../assets/logo-ip.png" alt="Logo" onerror="this.style.display='none'">
    </div>
    <h1>Accesso Amministratore</h1>
    <p class="subtitle">Inserisci le credenziali per accedere all'area riservata</p>

    <form id="login-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required autocomplete="email" placeholder="admin@azienda.it">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="••••••••">
      </div>
      <button type="submit" id="login-btn" class="btn-login">Accedi</button>
    </form>

    <div id="message" class="message"></div>

    <div class="info-box">
      <strong>Accesso protetto.</strong> Quest'area è riservata al personale autorizzato.
      I dati sono trattati secondo il Regolamento UE 2016/679 (GDPR).
    </div>

    <div class="links">
      <a href="#" onclick="resetPassword(event)">Password dimenticata?</a>
    </div>
  </div>

  <script src="../frontend/config.js"></script>
  <script>
    const SUPABASE_URL      = CONFIG.supabase.url;
    const SUPABASE_ANON_KEY = CONFIG.supabase.anonKey;

    // Auto-redirect if session is still active
    (async function checkSession() {
      const refreshToken = localStorage.getItem('sb-refresh-token');
      if (!refreshToken) return;
      try {
        const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=refresh_token`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON_KEY },
          body: JSON.stringify({ refresh_token: refreshToken })
        });
        if (res.ok) {
          const data = await res.json();
          localStorage.setItem('sb-access-token',  data.access_token);
          localStorage.setItem('sb-refresh-token', data.refresh_token);
          window.location.href = 'index.html';
        }
      } catch (_) { /* no active session */ }
    })();

    document.getElementById('login-form').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      btn.disabled = true;
      btn.textContent = 'Accesso in corso...';

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      try {
        const res  = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON_KEY },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (res.ok) {
          localStorage.setItem('sb-access-token',  data.access_token);
          localStorage.setItem('sb-refresh-token', data.refresh_token);
          showMsg('success', 'Accesso effettuato. Reindirizzamento...');
          setTimeout(() => window.location.href = 'index.html', 800);
        } else {
          throw new Error(data.error_description || 'Credenziali non valide');
        }
      } catch (err) {
        showMsg('error', err.message);
        btn.disabled = false;
        btn.textContent = 'Accedi';
      }
    });

    async function resetPassword(e) {
      e.preventDefault();
      const email = window.prompt('Inserisci la tua email per il reset della password:');
      if (!email) return;
      try {
        await fetch(`${SUPABASE_URL}/auth/v1/recover`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON_KEY },
          body: JSON.stringify({ email })
        });
        showMsg('success', 'Se l\'account esiste riceverai un\'email di reset.');
      } catch (_) {
        showMsg('error', 'Errore durante l\'invio. Riprova più tardi.');
      }
    }

    function showMsg(type, text) {
      const m = document.getElementById('message');
      m.className = 'message ' + type;
      m.textContent = text;
      m.style.display = 'block';
    }
  </script>
</body>
</html>
